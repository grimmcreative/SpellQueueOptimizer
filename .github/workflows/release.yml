name: Release to CurseForge

# Publishes the addon to CurseForge whenever a version tag (e.g. v1.1.0) is pushed.
# Requires:
#   - Repo secret CF_API_KEY  -> a CurseForge API token (authors.curseforge.com)
#   - TOC field ## X-Curse-Project-ID: <numeric id>
on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Package and upload to CurseForge
        uses: BigWigsMods/packager@v2
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
